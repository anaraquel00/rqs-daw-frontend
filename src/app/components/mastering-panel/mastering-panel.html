<div class="mastering-board" *ngIf="originalFile">
  <!-- Reprodutor e Toggle A/B -->
  <div class="player-section">

    <!-- 💿 MOTOR ORIGINAL (Oculto se Master estiver ativo) -->
    <audio [src]="originalAudioUrl" controls class="cyber-player"
           [style.display]="modoAudicao === 'original' ? 'block' : 'none'">
    </audio>

    <!-- 🎛️ MOTOR MASTERIZADO (Oculto se Original estiver ativo) -->
    <audio *ngIf="masteredAudioUrl" [src]="masteredAudioUrl" controls class="cyber-player"
           [style.display]="modoAudicao === 'master' ? 'block' : 'none'">
    </audio>

    <!-- Placeholder caso não haja master ainda, para manter o design alinhado -->
    <div class="cyber-player placeholder" *ngIf="modoAudicao === 'master' && !masteredAudioUrl" style="height: 40px;"></div>

    <div class="toggle-container">
      <button class="toggle-btn"
              [class.active]="modoAudicao === 'original'"
              (click)="alternarModo('original')">
        Original
      </button>

      <!-- O Switch visual -->
      <div class="switch" (click)="alternarModo(modoAudicao === 'original' ? 'master' : 'original')">
        <div class="slider" [class.on]="modoAudicao === 'master'"></div>
      </div>

      <button class="toggle-btn"
              [class.active]="modoAudicao === 'master'"
              [disabled]="!masteredAudioUrl"
              (click)="alternarModo('master')">
        Master
      </button>
    </div>

    <div class="volume-match">
      <input type="checkbox" id="volMatch" [(ngModel)]="volumeMatch" disabled>
      <label for="volMatch">Volume Match (Em construção 🔧)</label>
    </div>
  </div>

  <hr class="cyber-divider">

  <!-- Controles de Engenharia -->
  <div class="controls-section">
     <div class="control-group">
      <h4>Perfil Acústico (Powered by RQS DSP)</h4>
      <div class="btn-group profiles-grid">
        <button [class.selected]="estiloSelecionado === 'thunder'" (click)="selecionarEstilo('thunder')">
          🌩️ Thunder
        </button>
        <button [class.selected]="estiloSelecionado === 'clear_sky'" (click)="selecionarEstilo('clear_sky')">
          ☁️ Clear Sky
        </button>
        <button [class.selected]="estiloSelecionado === 'sunroof'" (click)="selecionarEstilo('sunroof')">
          ☀️ Sunroof
        </button>
        <button [class.selected]="estiloSelecionado === 'aurora'" (click)="selecionarEstilo('aurora')">
          🌌 Aurora
        </button>
      </div>
    </div>
  </div>

  <div class="action-buttons" style="display: flex; gap: 10px; margin-top: 15px;">

  <button class="btn-secondary" (click)="dispararPreview()" [disabled]="isProcessing">
    {{ isProcessing ? 'Analisando...' : '🎧 OUVIR TESTE (15s)' }}
  </button>

  <button class="btn-process" (click)="dispararProcessamento()" [disabled]="isProcessing">
    {{ isProcessing ? 'Processando IA Acústica...' : '🔥 MASTERIZAR FAIXA COMPLETA' }}
  </button>
</div>
</div>
